{% extends "Layout.html" %}

{% block content %}
<style>
    .analyzer-container { 
        border: 2px solid orange; 
        padding: 20px; 
        border-radius: 15px; 
        display: inline-block; 
        min-width: 300px;
        background: #222;
    }
    
    input {
        padding: 10px;
        border-radius: 5px;
        border: 1px solid orange;
        margin-bottom: 10px;
        background: #333;
        color: white;
    }

    button {
        padding: 10px 20px;
        background-color: orange;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }

    .result-box {
        color: black;
        margin-top: 20px;
        padding: 20px;
        border-radius: 15px;
        font-weight: bold;
        border: 2px solid #333;
    }
</style>

<div class="analyzer-container">
    <h1>🌪️ Tornado Analyzer Online</h1>
    <p>Enter the wind speed to determine the EF-Scale category.</p>

    <form method="POST">
        <input type="number" name="speed" placeholder="Wind speed (mph)" required>
        <br>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        <div class="result-box" style="background-color: {{ color }};">
            <h2>Result: {{ result }}</h2>
        </div>
    {% endif %}
</div>
{% endblock %}
