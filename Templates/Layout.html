<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tornado Project</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        nav { background: #333; padding: 15px; margin-bottom: 30px; }
        nav a { color: orange; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .content { padding: 20px; }
    </style>
</head>
<body>
    <nav class="navbar">
    <div class="nav-container">
        <a href="{{ url_for('home') }}" class="nav-logo">🌪️ Tornado Hub</a>
        <div class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('analyzer') }}">Analyzer</a>
            <a href="{{ url_for('archive') }}">Archive 2020</a>
        </div>
    </div>
</nav>

<style>
    .navbar {
        background-color: #000;
        border-bottom: 2px solid orange;
        padding: 1rem 0;
        margin-bottom: 30px;
    }
    .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 20px;
    }
    .nav-logo {
        color: orange;
        font-size: 1.5rem;
        font-weight: bold;
        text-decoration: none;
    }
    .nav-links a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        transition: color 0.3s;
    }
    .nav-links a:hover {
        color: orange;
    }
</style>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
