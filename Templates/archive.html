{% extends "Layout.html" %}

{% block content %}
<style>
    .search-section {
        background: #222;
        padding: 30px;
        border-radius: 15px;
        border: 2px solid orange;
        margin-bottom: 50px;
        text-align: left;
    }
    .search-form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .form-group label {
        color: orange;
        font-weight: bold;
        font-size: 0.9rem;
    }
    .form-group input {
        padding: 10px;
        background: #333;
        border: 1px solid #444;
        border-radius: 5px;
        color: white;
    }
    .form-group input:focus {
        border-color: orange;
        outline: none;
    }
    .search-btn {
        grid-column: span 2;
        padding: 12px;
        background: orange;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        font-size: 1.1rem;
        transition: 0.3s;
    }
    .search-btn:hover {
        background: #e69500;
        transform: translateY(-2px);
    }
    .archive-menu {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
        margin-top: 50px;
    }
    .year-link {
        font-size: 5rem;
        font-weight: 900;
        color: transparent;
        -webkit-text-stroke: 2px orange;
        text-decoration: none;
        transition: all 0.3s ease;
        line-height: 1;
    }
    .year-link:hover {
        color: orange;
        -webkit-text-stroke: 2px white;
        transform: scale(1.1);
    }
    .archive-title {
        color: white;
        font-size: 2rem;
        margin-bottom: 20px;
        border-bottom: 2px solid orange;
        display: inline-block;
        padding-bottom: 10px;
    }
</style>

<div class="archive-container">
    <div class="search-section">
        <h2 style="color: white; margin-top: 0;">Search Archive</h2>
        <form action="{{ url_for('search_archive') }}" method="GET" class="search-form">
            <div class="form-group" style="grid-column: span 2;">
                <label>Tornado Name or Location</label>
                <input type="text" name="query" placeholder="e.g. Nashville or Easter Outbreak">
            </div>
            <div class="form-group">
                <label>From Date</label>
                <input type="date" name="start_date">
            </div>
            <div class="form-group">
                <label>To Date</label>
                <input type="date" name="end_date">
            </div>
            <button type="submit" class="search-btn">🔍 Search Tornadoes</button>
        </form>
    </div>

    <h1 class="archive-title">Select a Year</h1>
    <div class="archive-menu">
        {% for year in years %}
            <a href="{{ url_for('archive_year', year=year) }}" class="year-link">{{ year }}</a>
        {% endfor %}
    </div>
</div>
{% endblock %}
